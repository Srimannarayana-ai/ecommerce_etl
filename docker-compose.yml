services:
  airflow-standalone:
    build: .
    container_name: ecommerce_airflow
    ports:
      - "8080:8080" # Map the Airflow web UI to localhost:8080
    volumes:
      # Map our entire project folder into the Airflow DAGs directory
      - .:/opt/airflow/dags
    environment:
      # Keep Airflow clean by turning off the default tutorial DAGs
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      # Give the webserver more time to start up
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=300
    # Use the "standalone" command to run the database, scheduler, and webserver all in one container
    command: standalone
